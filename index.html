<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTA会計管理アプリ | ポータル</title>
    <!-- <meta http-equiv="refresh" content="0;URL='./2026/'" /> -->
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f7f6;
        color: #333;
        text-align: center;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 90%;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
      }
      .btn {
        display: block;
        text-decoration: none;
        padding: 15px;
        margin: 10px 0;
        border-radius: 8px;
        font-weight: bold;
        transition: opacity 0.2s;
      }
      .btn-main {
        background-color: #4caf50;
        color: white;
      }
      .btn-sub {
        background-color: #ddd;
        color: #333;
        font-size: 0.9rem;
      }
      .btn:hover {
        opacity: 0.8;
      }
      .loading-text {
        font-size: 0.9rem;
        color: #666;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PTA会計管理アプリ</h1>

      <a href="./2026/" class="btn btn-main">2026年度以降（本番版）へ</a>
      <a href="./2025/" class="btn btn-sub">2025年度（ベータ版）を参照</a>

      <p class="loading-text">最新年度へ移動しています...</p>
    </div>

    <!-- <script>
      // JavaScriptによる補完的な転送
      setTimeout(function () {
        window.location.href = "./2026/";
      }, 500);
    </script> -->
  </body>
</html>
